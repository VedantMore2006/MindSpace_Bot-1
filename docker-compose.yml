version: '3.8'

services:
  mindspace-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindspace-chatbot
    restart: unless-stopped
    ports:
      - "8015:8015"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CONVERSATIONAL_BOT_API_KEY=${CONVERSATIONAL_BOT_API_KEY}
      - DB_PATH=/app/data/mindspace.db
      - API_HOST=0.0.0.0
      - API_PORT=8015
      - API_RELOAD=False
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8015/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M